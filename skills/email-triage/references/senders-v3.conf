# Email triage sender rules v3 — unified (all accounts)
# First match wins. Columns: from  to  subject  disposition  rule
# Dispositions: delete (trash immediately), escalate (send to gateway, skip classifier)
# Wildcards: * (any), *.domain.com (subdomain), *substring* (contains)
# No match → goes to classifier (Stage 2)

